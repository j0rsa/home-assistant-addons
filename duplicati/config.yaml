---
name: "Duplicati"
version: "2.1.0.5.2"
slug: "duplicati"
description: |
  Duplicati 
  
  Backup your data to the cloud or locally with Duplicati.
environment:
  PUID: "0"
  PGID: "0"
  TZ: Etc/UTC
options:
  password: "changeme"
schema:
  password: str
init: false
startup: services
apparmor: true
arch:
  - aarch64
  - amd64
map: 
  - addon_config:rw #will be mapped to /config
  - share:rw
  - backup:rw
  - media:rw
boot: auto
codenotary: "red.avtovo@gmail.com"
image: "ghcr.io/j0rsa/duplicati-{arch}"
udev: false
url: https://github.com/j0rsa/home-assistant-addons
ports:
  8200/tcp: null
ports_description:
  8200/tcp: Web UI port (no longer ingress possible)
backup_exclude: 
  - "/backup"

privileged:
  - DAC_READ_SEARCH

ingress: false
# Not possible after 2.1.x version, that enforces loging in
# ingress_port: 8200
panel_icon: mdi:content-duplicate
